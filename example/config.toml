# pmaid 設定ファイル例
# ~/.pmaid/config.toml に配置してください
# 全項目にデフォルト値があるため、変更したい項目のみ記述すれば動作します

# トップレベル設定
name = "pmaid"             # AIアシスタントの名前 (プロンプト表示やシステムプロンプトに使用)
model = "gpt-4o"          # 使用するLLMモデル
context_dir = "."          # デフォルトのコンテキストディレクトリ
memory_path = ""           # メモリ保存先 (空の場合 ~/.pmaid/memory)

# LLM設定
[llm]
provider = "openai"        # LLMプロバイダー
api_key = ""               # APIキー (環境変数 OPENAI_API_KEY でも可)
model = "gpt-4o"           # モデル名

# Embedding設定
[memory]
embedding_dim = 512        # Embeddingベクトルの次元数

# 短期記憶 (STM) 設定
[stm]
max_items = 7              # ワーキングメモリの最大容量
activation_threshold = 0.1 # この値以下のアイテムは削除
normal_decay_rate = 0.15   # 通常アイテムの活性化減衰率
emotional_decay_rate = 0.07 # 感情的アイテムの活性化減衰率 (遅い)
refresh_boost = 0.3        # キーワード一致時の活性化ブースト

# 長期記憶 (LTM) 設定
[ltm]
top_k = 5                  # 検索結果の最大件数
similarity_threshold = 0.3 # コサイン類似度の閾値
thread_boost = 0.1         # 同一スレッドのスコアブースト
date_boost = 0.15          # 日付一致時のスコアブースト
emotional_boost = 0.12     # 感情的記憶のスコアブースト係数

# 軽量LLM設定 (コンテキスト圧縮の要約生成等に使用、省略可)
[light_llm]
provider = "google"        # "google" or "openai"
api_key = ""               # APIキー (環境変数 GEMINI_API_KEY でも可)
model = "gemma-3-4b-it"    # 軽量モデル名

# エージェント設定
[agent]
max_tool_iterations = 50   # 1ターンあたりのツール呼び出し上限
max_context_chars = 100000 # コンテキスト圧縮が発動する文字数上限
