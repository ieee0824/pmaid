name: release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          VERSION="${{ github.event.release.tag_name }}"
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "pmaid-${GOOS}-${GOARCH}${EXT}" ./cmd/pmaid/

      - name: Create archive
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          BINARY="pmaid-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          ARCHIVE="pmaid-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "${ARCHIVE}" "${BINARY}"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          ARCHIVE="pmaid-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          gh release upload "${{ github.event.release.tag_name }}" \
            "pmaid-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            "${ARCHIVE}"

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get release tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "pmaid-*.tar.gz"

      - name: Compute checksums
        id: sha
        run: |
          echo "darwin_amd64=$(sha256sum pmaid-darwin-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(sha256sum pmaid-darwin-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum pmaid-linux-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum pmaid-linux-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Set up SSH for tap repo
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${TAP_DEPLOY_KEY}" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'SSHCONFIG'
          Host github.com-tap
            HostName github.com
            User git
            IdentityFile ~/.ssh/tap_deploy_key
            IdentitiesOnly yes
          SSHCONFIG
          sed -i 's/^          //' ~/.ssh/config

      - name: Update Homebrew formula
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ steps.tag.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          cat > pmaid.rb << FORMULA
          class Pmaid < Formula
            desc "AI-powered project management assistant"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/pmaid-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              else
                url "${BASE_URL}/pmaid-darwin-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/pmaid-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              else
                url "${BASE_URL}/pmaid-linux-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install Dir["pmaid-*"].first => "pmaid"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/pmaid --version", 2)
            end
          end
          FORMULA

          # Remove leading spaces from heredoc
          sed -i 's/^          //' pmaid.rb

          git clone git@github.com-tap:ieee0824/homebrew-tap.git
          cd homebrew-tap
          mkdir -p Formula
          cp ../pmaid.rb Formula/pmaid.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pmaid.rb
          git commit -m "Update pmaid to ${VERSION}"
          git push
